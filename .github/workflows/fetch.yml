name: 每日盤後抓股票資料

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 台灣時間 14:45，週一到週五
  workflow_dispatch:          # 允許手動觸發

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install yfinance pandas requests

      - name: 執行抓資料腳本
        run: python fetch_data.py

      - name: 儲存 data.json 回 GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "每日更新：$(date '+%Y-%m-%d %H:%M')"
          git push
